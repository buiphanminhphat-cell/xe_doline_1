<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Giám sát & Điều khiển AGV - Era Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thêm thư viện Era Widget SDK -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget-sdk@1.5.0/dist/index.js"></script>
    <style>
        :root {
            --primary-bg: #00bfa5;
            --card-bg: #ffffff;
            --header-green: #00695c;
            --accent-purple: #6a1b9a;
            --transition-speed: 0.3s;
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 40px);
        }

        .panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed);
        }

        .header-box {
            background: linear-gradient(135deg, var(--header-green), #004d40);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Bảng thông tin */
        .info-table-container {
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: center;
        }

        .info-table th {
            background-color: #f8f9fa;
            color: var(--accent-purple);
            padding: 12px 8px;
            font-weight: 600;
        }

        .info-table td {
            padding: 14px 8px;
            border-bottom: 1px solid #f5f5f5;
        }

        /* Robot Preview */
        .robot-preview-container {
            background: #fdfdfd;
            border: 1px dashed #ddd;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }

        .robot-svg {
            width: 90px;
            height: 70px;
            background: #455a64;
            border-radius: 8px;
            position: relative;
        }

        .robot-svg::before, .robot-svg::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 25px;
            background: #212121;
            left: -6px;
            border-radius: 3px;
        }
        .robot-svg::before { top: 6px; }
        .robot-svg::after { bottom: 6px; }

        .direction-indicator {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            color: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translateY(-50%) translateX(0); }
            50% { opacity: 1; transform: translateY(-50%) translateX(5px); }
        }

        /* Switches */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e0e0e0;
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Control */
        .joystick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .control-btn {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #ddd;
        }

        .control-btn:active { 
            transform: translateY(3px);
            box-shadow: none;
        }

        .vertical-slider {
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 150px;
            background: #ddd;
            outline: none;
        }

        #mapCanvas {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 20px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .status-busy { background: #e3f2fd; color: #1976d2; }
        .status-battery { background: #e8f5e9; color: #2e7d32; }
        
        /* Chế độ offline cho các nút */
        .disabled-action {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Panel 1: AGV Info -->
    <div class="panel">
        <div class="header-box">AGV Information</div>
        <div class="info-table-container">
            <table class="info-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Target</th>
                        <th>Speed</th>
                        <th>Bat</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="font-bold">01</td>
                        <td><span id="txt-status" class="status-badge status-busy">OFFLINE</span></td>
                        <td id="txt-target">--</td>
                        <td id="txt-speed-val">0.0 m/s</td>
                        <td><span id="txt-battery" class="status-badge status-battery">--%</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="robot-preview-container">
            <div class="flex flex-col">
                <span class="text-purple-800 text-[10px] font-extrabold uppercase tracking-wider mb-2">Simulation</span>
                <label class="switch">
                    <input type="checkbox" id="sim-mode">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="robot-svg">
                <div class="direction-indicator" id="robot-dir">▶</div>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btn-start" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <span class="text-[10px] font-bold text-slate-700">START</span>
                    <div class="w-8 h-8 bg-green-500 rounded-lg shadow-sm flex items-center justify-center text-white">▶</div>
                </button>
                <button id="btn-stop" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <span class="text-[10px] font-bold text-slate-700">STOP</span>
                    <div class="w-8 h-8 bg-red-500 rounded-lg shadow-sm flex items-center justify-center text-white text-xs">■</div>
                </button>
            </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between">
            <span class="text-purple-800 text-[10px] font-extrabold uppercase tracking-wider">Auto Mode</span>
            <label class="switch">
                <input type="checkbox" id="auto-mode" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- Panel Map -->
    <div class="panel" style="grid-row: span 2;">
        <div class="header-box" style="margin-bottom: 10px; background: #eceff1; color: #546e7a; box-shadow: none;">Live Map Monitor</div>
        <canvas id="mapCanvas"></canvas>
    </div>

    <!-- Panel Manual Control -->
    <div class="panel">
        <div class="header-box" style="margin-bottom: 15px; font-size: 0.75rem; background: #78909c;">Manual Override</div>
        <div class="grid grid-cols-4 gap-6 h-full items-center">
            <div class="col-span-3 joystick-grid">
                <div></div>
                <button id="btn-up" class="control-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#757575"><path d="M12 4l-8 8h16l-8-8z"/></svg>
                </button>
                <div></div>
                
                <button id="btn-left" class="control-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#757575"><path d="M4 12l8 8v-16l-8 8z"/></svg>
                </button>
                <div class="flex flex-col items-center">
                    <span id="power-display" class="text-[14px] font-black text-slate-400">0%</span>
                    <span class="text-[8px] uppercase text-slate-400 font-bold">Power</span>
                </div>
                <button id="btn-right" class="control-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#757575"><path d="M20 12l-8-8v16l8-8z"/></svg>
                </button>

                <div></div>
                <button id="btn-down" class="control-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#757575"><path d="M12 20l8-8h-16l8 8z"/></svg>
                </button>
                <div></div>
            </div>

            <div class="flex flex-col items-center bg-slate-50 p-2 rounded-xl">
                <span class="text-[10px] font-bold text-slate-500 mb-2 uppercase">Speed</span>
                <input type="range" id="speed-slider" class="vertical-slider" min="0" max="100" value="45">
                <div id="speed-val-label" class="mt-2 text-[10px] font-bold text-slate-400">45%</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- KHỞI TẠO ERA WIDGET ---
    const eraWidget = new EraWidget();
    let eraConfig = null;
    let currentActions = {};

    eraWidget.init({
        onConfiguration: (configuration) => {
            eraConfig = configuration;
        },
        onValues: (values) => {
            // Nhận dữ liệu từ thiết bị gửi lên
            if (!eraConfig) return;

            // 1. Cập nhật Pin (Giả sử chân V_BATTERY)
            if (eraConfig.V_BATTERY && values[eraConfig.V_BATTERY.id]) {
                const bat = values[eraConfig.V_BATTERY.id].value;
                document.getElementById('txt-battery').innerText = bat + '%';
            }

            // 2. Cập nhật Status (Giả sử chân V_STATUS)
            if (eraConfig.V_STATUS && values[eraConfig.V_STATUS.id]) {
                const status = values[eraConfig.V_STATUS.id].value;
                const statusEl = document.getElementById('txt-status');
                statusEl.innerText = status == 1 ? "BUSY" : "IDLE";
                statusEl.className = status == 1 ? "status-badge status-busy" : "status-badge status-battery";
            }
            
            // 3. Cập nhật Tốc độ hiện tại (V_SPEED_REAL)
            if (eraConfig.V_SPEED_REAL && values[eraConfig.V_SPEED_REAL.id]) {
                document.getElementById('txt-speed-val').innerText = values[eraConfig.V_SPEED_REAL.id].value + ' m/s';
            }
        }
    });

    // Hàm gửi lệnh về Era
    function sendAction(pinKey, value) {
        if (eraConfig && eraConfig[pinKey]) {
            eraWidget.triggerAction(eraConfig[pinKey].id, value);
        }
    }

    // --- BẮT SỰ KIỆN GIAO DIỆN ---

    // 1. Nút Start/Stop
    document.getElementById('btn-start').onclick = () => sendAction('V_CONTROL', 1);
    document.getElementById('btn-stop').onclick = () => sendAction('V_CONTROL', 0);

    // 2. Điều hướng (Joystick)
    // Quy ước: 0:Stop, 1:Up, 2:Down, 3:Left, 4:Right
    const setupJoystick = (id, value) => {
        const btn = document.getElementById(id);
        const startMove = () => {
            sendAction('V_MOVE', value);
            document.getElementById('power-display').innerText = '100%';
            document.getElementById('power-display').classList.replace('text-slate-400', 'text-green-500');
        };
        const stopMove = () => {
            sendAction('V_MOVE', 0);
            document.getElementById('power-display').innerText = '0%';
            document.getElementById('power-display').classList.replace('text-green-500', 'text-slate-400');
        };

        btn.addEventListener('mousedown', startMove);
        btn.addEventListener('mouseup', stopMove);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(); });
        btn.addEventListener('touchend', stopMove);
    };

    setupJoystick('btn-up', 1);
    setupJoystick('btn-down', 2);
    setupJoystick('btn-left', 3);
    setupJoystick('btn-right', 4);

    // 3. Thanh trượt tốc độ
    const speedSlider = document.getElementById('speed-slider');
    speedSlider.oninput = (e) => {
        const val = e.target.value;
        document.getElementById('speed-val-label').innerText = val + '%';
        sendAction('V_SPEED_SET', val);
    };

    // 4. Chế độ Auto/Manual
    document.getElementById('auto-mode').onchange = (e) => {
        sendAction('V_MODE', e.target.checked ? 1 : 0);
    };

    // --- PHẦN VẼ MAP (GIỮ NGUYÊN LOGIC CŨ) ---
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');

    const stations = [
        { id: 1, x: 100, y: 350, label: "Trạm 8" }, { id: 2, x: 100, y: 550, label: "Trạm 2" },
        { id: 3, x: 350, y: 350, label: "Trạm 7" }, { id: 4, x: 350, y: 550, label: "Trạm 3" },
        { id: 5, x: 600, y: 350, label: "Trạm 6" }, { id: 6, x: 600, y: 550, label: "Trạm 1" },
        { id: 7, x: 800, y: 550, label: "Trạm 4" }, { id: 8, x: 800, y: 350, label: "Trạm 5" },
        { id: 9, x: 600, y: 150, label: "Trạm 10" }, { id: 10, x: 800, y: 150, label: "Trạm 9" },
        { id: 11, x: 1000, y: 150, label: "Trạm 12" }, { id: 12, x: 1000, y: 350, label: "Trạm 11" }
    ];

    function drawMap() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 700;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Vẽ Grid
        ctx.strokeStyle = '#f5f5f5';
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

        // Vẽ đường đi
        ctx.strokeStyle = '#3d5afe';
        ctx.lineWidth = 4;
        ctx.beginPath();
        const connections = [[1, 3], [3, 5], [5, 12], [2, 4], [4, 6], [6, 7], [1, 9], [9, 10], [10, 11], [1, 2], [3, 4], [5, 6], [8, 7], [10, 8], [11, 12]];
        connections.forEach(([sId, eId]) => {
            const s = stations.find(st => st.id === sId);
            const e = stations.find(st => st.id === eId);
            ctx.moveTo(s.x * scaleX, s.y * scaleY);
            ctx.lineTo(e.x * scaleX, e.y * scaleY);
        });
        ctx.stroke();

        // Trạm
        stations.forEach(st => {
            ctx.fillStyle = '#f44336';
            ctx.beginPath(); ctx.arc(st.x * scaleX, st.y * scaleY, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#455a64';
            ctx.font = 'bold 10px Inter';
            ctx.fillText(st.label, st.x * scaleX - 20, st.y * scaleY - 10);
        });

        // Vẽ Robot (Ví dụ vị trí tĩnh, bạn có thể cập nhật x, y từ Era SDK chân V_X, V_Y)
        const rx = 200 * scaleX; const ry = 550 * scaleY;
        ctx.fillStyle = '#37474f';
        ctx.fillRect(rx - 15, ry - 10, 30, 20);
    }

    window.onload = drawMap;
    window.onresize = drawMap;
</script>

</body>
</html>
